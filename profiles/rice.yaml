name: rice
description: Aesthetic rice only — WM + bar + theming (no dev tools)
variant: auto

base-packages:
  - git
  - curl
  - wget
  - unzip
  - rsync
  - jq
  - python
  - python-dateutil

modules:
  - zsh
  - alacritty
  - hyprland
  - waybar
  - dunst
  - rofi
  - cava
  - fastfetch
  - pipewire
  - gtk
  - kitty
  - kvantum
  - qt6ct
  - sddm

fonts:
  - noto-fonts
  - noto-fonts-cjk
  - noto-fonts-emoji
  - ttf-font-awesome
  - ttf-jetbrains-mono-nerd

aur-fonts:
  - ttf-terminus-font
  - ttf-iosevka-nerd
  - ttf-inconsolata-nerd
  - ttf-material-design-icons-desktop

networking:
  - networkmanager
  - network-manager-applet
  - bluez
  - bluez-utils
  - blueman

networking-services:
  - NetworkManager
  - bluetooth

extras-aur:
  - gcalcli
