name: ricectl CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Shellcheck + YAML
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Shellcheck ricectl
        run: shellcheck -x ricectl

      - name: Shellcheck libraries
        run: shellcheck -x lib/*.sh

      - name: Shellcheck install.sh
        run: shellcheck -x install.sh

      - name: Shellcheck module hooks
        run: |
          find modules/ -name '*.sh' -exec shellcheck -x {} +

      - name: Validate YAML syntax
        run: |
          sudo apt-get install -y python3-yaml
          python3 -c "
          import yaml, glob, sys
          errors = 0
          for f in glob.glob('modules/*/module.yaml') + glob.glob('profiles/*.yaml'):
              try:
                  with open(f) as fh:
                      yaml.safe_load(fh)
                  print(f'  ✓ {f}')
              except yaml.YAMLError as e:
                  print(f'  ✗ {f}: {e}')
                  errors += 1
          sys.exit(errors)
          "

      - name: Verify module structure
        run: |
          status=0
          for dir in modules/*/; do
            mod=$(basename "$dir")
            if [[ ! -f "$dir/module.yaml" ]]; then
              echo "✗ Module $mod missing module.yaml"
              status=1
            else
              # Check required fields
              for field in name description category; do
                if ! grep -q "^$field:" "$dir/module.yaml"; then
                  echo "✗ Module $mod missing field: $field"
                  status=1
                fi
              done
              echo "✓ Module $mod"
            fi
          done
          exit $status

      - name: Verify profiles reference valid modules
        run: |
          status=0
          for profile in profiles/*.yaml; do
            pname=$(basename "$profile" .yaml)
            # Extract module names from YAML list under 'modules:'
            in_modules=false
            while IFS= read -r line; do
              if [[ "$line" =~ ^modules: ]]; then
                in_modules=true
                continue
              fi
              if $in_modules; then
                if [[ "$line" =~ ^[[:space:]]+-[[:space:]]*(.*) ]]; then
                  mod="${BASH_REMATCH[1]}"
                  if [[ ! -d "modules/$mod" ]]; then
                    echo "✗ Profile $pname references unknown module: $mod"
                    status=1
                  fi
                elif [[ "$line" =~ ^[a-z] ]]; then
                  in_modules=false
                fi
              fi
            done < "$profile"
            echo "✓ Profile $pname"
          done
          exit $status

  dry-run:
    name: Dry run test
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Test ricectl help
        run: |
          chmod +x ricectl
          ./ricectl help

      - name: Test ricectl version
        run: ./ricectl version
