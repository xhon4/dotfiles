### MONITOR ###
monitor=,preferred,auto,1


### ============================================================
### AUTOSTART
### ============================================================

exec-once = dunst

exec-once = waybar
exec-once = ~/.config/hypr/waybar-fullscreen.sh


exec-once = awww-daemon
exec-once = sleep 1 && awww img /usr/share/backgrounds/y8yxlx.jpg
exec-once = hypridle
exec-once = nm-applet --indicator

# Picom ya no hace falta — Hyprland es el compositor


### ============================================================
### INPUT
### ============================================================
input {
    follow_mouse = 1                 # focus_follows_pointer = true
    sensitivity = 0
    kb_layout = latam
}


### ============================================================
### GENERAL (equivale a bspc config)
### ============================================================
general {
    gaps_in = 4                      # mitad de window_gap = 8
    gaps_out = 8
    border_size = 1                  # border_width = 1

    col.inactive_border = rgba(3d3d3dff)   # normal_border_color
    col.active_border   = rgba(c0c0c0ff)   # focused_border_color (plata retro)

    layout = dwindle                 # equivalente más cercano al tiling de bspwm
}


### ============================================================
### DECORACIÓN
### ============================================================
decoration {
    rounding = 0                     # sin bordes redondeados, estilo retro

    blur {
        enabled = false              # activá si querés blur en ventanas flotantes
    }

    shadow {
        enabled = true
        range = 8
        render_power = 2
        color = rgba(00000088)
    }
}


### ============================================================
### ANIMACIONES
### ============================================================
animations {
    enabled = true

    bezier = snappy, 0.25, 0.1, 0.25, 1.0

    animation = windows,     1, 3,  snappy, slide
    animation = windowsOut,  1, 3,  snappy, slide
    animation = fade,        1, 4,  snappy
    animation = workspaces,  1, 4,  snappy, slidevert
}


### ============================================================
### LAYOUT — Dwindle (más parecido a bspwm)
### ============================================================
dwindle {
    pseudotile        = false
    preserve_split    = true
    split_width_multiplier = 1.0    # ≈ split_ratio 0.5
}


### ============================================================
### MISC
### ============================================================
misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    focus_on_activate = true
}


### ============================================================
### WORKSPACES (I–IX → 1–9)
### ============================================================
# En Hyprland los workspaces son numéricos por defecto.
# Si querés labels romanos en waybar, configuralo en el módulo workspaces de waybar.
workspace = 1, persistent:true
workspace = 2, persistent:true
workspace = 3, persistent:true
workspace = 4, persistent:true
workspace = 5, persistent:true
workspace = 6, persistent:true
workspace = 7, persistent:true
workspace = 8, persistent:true
workspace = 9, persistent:true


### ============================================================
### KEYBINDS
### ============================================================
$mod = SUPER

# --- APPS ---
bind = $mod, Return,    exec, alacritty
bind = $mod, BackSpace, exec, ~/.config/hypr/power_menu.sh
bind = $mod, period, exec, ~/.config/rofi/scripts/emote-picker.sh
bind = $mod, A,         exec, rofi -show drun
# Nota: en Wayland rofi necesita rofi-wayland (fork). Alternativa: wofi o fuzzel.

# --- WINDOW MANAGEMENT ---
bind = $mod, Q,         killactive                          # Close window
bind = $mod, F,         fullscreen, 0                       # Fullscreen
bind = $mod, V,         togglefloating                      # Toggle floating
bind = $mod, V, resizeactive, exact 800 600

# Move focus (h/j/k/l → l/d/u/r en Hyprland usa direcciones)
bind = $mod, H, movefocus, l
bind = $mod, J, movefocus, d
bind = $mod, K, movefocus, u
bind = $mod, L, movefocus, r

# Swap windows
bind = $mod SHIFT, H, swapwindow, l
bind = $mod SHIFT, J, swapwindow, d
bind = $mod SHIFT, K, swapwindow, u
bind = $mod SHIFT, L, swapwindow, r

# Rotar split (equivalente a bspc node @parent -R 90)
bind = $mod, I, layoutmsg, togglesplit

# Monocle/tiling toggle (equivalente a bspc desktop -l next)
bind = $mod SHIFT, M, fullscreen, 1                        # pseudo-monocle (maximized)

# --- WORKSPACES ---
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9

# Move window to workspace
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9

# --- RELOAD ---
# Hyprland recarga automáticamente al editar hyprland.conf
# Para forzar reload:
bind = $mod SHIFT, R, exec, hyprctl reload
bind = $mod SHIFT, S, exec, grim -g "$(slurp)" - | tee ~/Pictures/Screenshots/$(date +%Y-%m-%d_%H-%M-%S).png | wl-copy

# --- TOGGLE DESKTOP ---
bind = $mod, D, exec, ~/.config/hypr/toggle_desktop.sh

# --- MOUSE (mover y redimensionar flotantes) ---
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow
