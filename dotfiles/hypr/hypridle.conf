# ~/.config/hypr/hypridle.conf
# Alternativa nativa a monitor-control.sh — más limpia y sin script extra
# Dependencias: hypridle, playerctl
# Instalación:  pacman -S hypridle playerctl

general {
    lock_cmd = none                  # reemplazá con tu locker si querés
    before_sleep_cmd = hyprctl dispatch dpms off
    after_sleep_cmd  = hyprctl dispatch dpms on
    ignore_dbus_inhibit = false      # respeta inhibidores (ej: mpv, obs)
}

listener {
    timeout  = 300                   # 5 minutos — igual que el script original
    on-timeout = bash -c 'playerctl status 2>/dev/null | grep -q Playing || hyprctl dispatch dpms off'
    on-resume  = hyprctl dispatch dpms on
}
